<!-- ═══ FIREBASE SDK ═══ -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import { getFirestore, collection, query, where, getDocs }
    from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyCVnBlmeYmy2NEoPxixrquXgdmLju7v1j4",
    authDomain: "sakshar-e5c00.firebaseapp.com",
    projectId: "sakshar-e5c00",
    storageBucket: "sakshar-e5c00.firebasestorage.app",
    messagingSenderId: "495731533454",
    appId: "1:495731533454:web:2fcb2f4e4d04494cec4bdf",
    measurementId: "G-Z9JJCJ3KEM"
  };

  /*
  ═══════════════════════════════════════════════════════════════
  FIRESTORE COLLECTION: "resources"
  ═══════════════════════════════════════════════════════════════
  Fields per document:
    dept      : string   → "12sci" | "bscit" | "btech_cse" etc.
    type      : string   → "textbook" | "reference" | "notes" | "practice" | "pyq" | "formula"
    subject   : string   → "Physics" | "Data Structures" etc.
    semester  : string   → "Semester 3" | "PCM — Physics, Chemistry, Mathematics"
    title     : string   → "NCERT Physics Part 1"
    author    : string   → "NCERT" or contributor name
    fileUrl   : string   → Direct PDF download URL
    viewUrl   : string   → Google Drive /view or any preview URL
    approved  : boolean  → true (only true docs show)
    uploadedAt: Timestamp

    FOR formula type:
    formulaName : string → "Newton's 2nd Law"
    equation    : string → "F = m × a"
    description : string → "Force = Mass × Acceleration"
  ═══════════════════════════════════════════════════════════════
  */

  const app = initializeApp(firebaseConfig);
  const db  = getFirestore(app);

  window.fetchResources = async function(dept) {
    try {
      const q = query(collection(db, "resources"), where("dept", "==", dept));
      const snap = await getDocs(q);
      let docs = snap.docs.map(d => ({ id: d.id, ...d.data() }));
      // Filter approved client-side (no composite index needed)
      return docs.filter(d => d.approved === true || d.approved === undefined);
    } catch(err) {
      console.error("Firestore error:", err);
      throw err;
    }
  };

  window.firebaseReady = true;
  document.dispatchEvent(new Event("firebase-ready"));
</script>

<style>

  .main{padding:14px}.band{padding:24px 16px}.grid{grid-template-columns:1fr 1fr}.fgrid{grid-template-columns:1fr}.vbox{max-height:95vh}.pdf-frame{height:300px}

<div class="band">

<div class="layout">
  <div class="sb" id="sb"><div class="sb-hd">🎓 Departments</div></div>
  <div class="main">
    <div class="sr">
      <span style="color:var(--g4);font-size:1.1rem">🔍</span>
      <input type="text" id="si" placeholder="Search title, subject, author..." oninput="doSearch()">
      <span id="clr" style="cursor:pointer;color:var(--g4);display:none;font-size:.82rem;font-weight:700;padding:2px 7px;background:var(--g1);border-radius:5px" onclick="clrS()">✕</span>

      <button class="tab on" onclick="setTab('all',this)">All</button>

</footer>

<script>
// ═══ STATE ═══
var dept='12sci', tab='all', sq='';
var _cache={};  // dept → array of all docs

// ═══ DEPARTMENTS ═══
var DEPTS=[
  {id:'12sci',  icon:'🔬',label:'12th Science',      c:'#DC2626',bg:'#FFEEEE'},
  {id:'12com',  icon:'💹',label:'12th Commerce',     c:'#0891B2',bg:'#E8F8FC'},
  {id:'12arts', icon:'🎨',label:'12th Arts / HSC',   c:'#DB2777',bg:'#FFF0F7'},
  {id:'bscit',  icon:'💻',label:'BSc IT / BCA',      c:'#7C3AED',bg:'#F3EEFF'},
  {id:'bcom',   icon:'📊',label:'B.Com',             c:'#D97706',bg:'#FFF3E8'},
  {id:'ba',     icon:'🏛️',label:'BA (Arts)',         c:'#059669',bg:'#EDFAF2'},
  {id:'btech_cse',icon:'⚙️',label:'B.Tech – CSE/IT/AI',c:'#2563EB',bg:'#EBF3FF'},
  {id:'btech_mech',icon:'🔧',label:'B.Tech – Mechanical',c:'#EA580C',bg:'#FFF4EE'},
  {id:'btech_civil',icon:'🏗️',label:'B.Tech – Civil',c:'#0891B2',bg:'#E8F8FC'},
  {id:'pharma', icon:'💊',label:'Pharmacy (B.Pharm)',c:'#059669',bg:'#EDFAF2'},
  {id:'nursing',icon:'🏥',label:'Nursing / GNM / ANM',c:'#65A30D',bg:'#F0FCEA'},
];
var TM={
  textbook: {icon:'📖',lbl:'Textbook',  ibg:'#EBF3FF',itc:'#2563EB',tbg:'#DBEAFE'},
  reference:{icon:'📚',lbl:'Reference', ibg:'#FFF3E8',itc:'#D97706',tbg:'#FEF3C7'},
  notes:    {icon:'✏️',lbl:'Notes',     ibg:'#EDFAF2',itc:'#059669',tbg:'#D1FAE5'},
  practice: {icon:'📝',lbl:'Practice',  ibg:'#F3EEFF',itc:'#7C3AED',tbg:'#EDE9FE'},
  pyq:      {icon:'🗂️',lbl:'PYQ',      ibg:'#FFEEEE',itc:'#DC2626',tbg:'#FEE2E2'},
  formula:  {icon:'🧮',lbl:'Formula',   ibg:'#FFF0F7',itc:'#DB2777',tbg:'#FCE7F3'},
};

// ═══ AUTH / NAV ═══
function getU(){try{return JSON.parse(localStorage.getItem('sakshar_current')||'null')}catch{return null}}
var U=getU();
(function(){
  var el=document.getElementById('navl');
  if(!U){el.innerHTML='<a href="index.html" class="nb">Home</a><a href="login.html" class="nb">Login</a><a href="signup.html" class="nb pri">Join Free</a>';return;}
  var av=(U.fname||'S')[0].toUpperCase();
  el.innerHTML='<a href="dashboard.html" class="nb">Dashboard</a><a href="resources.html" class="nb on">📚 Resources</a><a href="smriti.html" class="nb">🤖 SMRITI</a><a href="notes.html" class="nb">📝 Notes</a><a href="about.html" class="nb">About</a>'+
    '<div style="display:flex;align-items:center;gap:7px;margin-left:4px"><div class="nav-av">'+av+'</div><button class="lo" onclick="localStorage.removeItem(\'sakshar_current\');location.href=\'login.html\'">Logout</button></div>';
})();
(function(){if(U&&U.dept){var f=DEPTS.find(function(d){return d.id===U.dept;});if(f)dept=f.id;}})();

// ═══ SIDEBAR ═══
function buildSB(){
  var sb=document.getElementById('sb');sb.innerHTML='<div class="sb-hd">🎓 Departments</div>';
  DEPTS.forEach(function(d){
    var btn=document.createElement('button');btn.className='db'+(d.id===dept?' on':'');btn.id='db-'+d.id;btn.innerHTML=d.icon+' '+d.label;
    btn.onclick=(function(id){return function(){setDept(id);};})(d.id);sb.appendChild(btn);
  });
}
function setDept(id){
  dept=id;sq='';document.getElementById('si').value='';document.getElementById('clr').style.display='none';
  document.querySelectorAll('.db').forEach(function(b){b.classList.remove('on');});
  var b=document.getElementById('db-'+id);if(b)b.classList.add('on');
  loadAndRender();
}
function setTab(t,el){tab=t;document.querySelectorAll('.tab').forEach(function(b){b.classList.remove('on');});el.classList.add('on');render();}
function doSearch(){sq=document.getElementById('si').value.toLowerCase().trim();document.getElementById('clr').style.display=sq?'inline':'none';render();}
function clrS(){document.getElementById('si').value='';sq='';document.getElementById('clr').style.display='none';render();}

// ═══ LOAD FROM FIREBASE ═══
function loadAndRender(){
  if(_cache[dept]){render();return;}
  var dInfo=DEPTS.find(function(d){return d.id===dept;})||DEPTS[0];
  document.getElementById('out').innerHTML=
    '<div class="dh"><div class="dh-ic" style="background:'+dInfo.bg+'">'+dInfo.icon+'</div>'+
    '<div><div class="dh-tt">'+dInfo.label+'</div><div class="dh-su">Loading from Firebase…</div></div></div>'+
    '<div class="spinner"><div class="spin-ring"></div> Fetching resources…</div>';
  if(!window.fetchResources){document.addEventListener('firebase-ready',function(){loadAndRender();},{once:true});return;}
  window.fetchResources(dept).then(function(docs){
    _cache[dept]=docs;render();
  }).catch(function(err){
    document.getElementById('out').innerHTML='<div class="err-box">⚠️ <strong>Could not load.</strong> '+err.message+'<br><small>Fix: Firestore Rules → allow read: if true → Publish</small></div>'+renderSetupGuide();
  });
}

// ═══ RENDER ═══
function render(){
  var dInfo=DEPTS.find(function(d){return d.id===dept;})||DEPTS[0];
  var all=_cache[dept]||[];
  var docs=all.slice();
  if(tab!=='all')docs=docs.filter(function(d){return d.type===tab;});
  if(sq)docs=docs.filter(function(d){
    return [(d.title||''),(d.subject||''),(d.author||''),(d.formulaName||'')].join(' ').toLowerCase().indexOf(sq)>=0;
  });
  var html='<div class="dh"><div class="dh-ic" style="background:'+dInfo.bg+'">'+dInfo.icon+'</div>'+
    '<div><div class="dh-tt">'+dInfo.label+'</div>'+
    '<div class="dh-su">'+all.length+' resources in Firebase • '+docs.length+' shown'+(sq?' for "'+sq+'"':'')+'</div></div></div>';
  if(!all.length){html+=renderSetupGuide();document.getElementById('out').innerHTML=html;return;}
  if(!docs.length){html+='<div class="empty"><div class="ei">🔍</div><p style="font-weight:700;font-size:1rem;margin-bottom:6px;color:var(--nv)">No results</p><p style="font-size:.84rem">Try a different keyword or tab</p></div>';document.getElementById('out').innerHTML=html;return;}
  // Separate formulas
  var formulas=docs.filter(function(d){return d.type==='formula';});
  var rest=docs.filter(function(d){return d.type!=='formula';});
  if(formulas.length)html+=renderFormulasSection(formulas);
  if(rest.length)html+=renderBySubjectAndType(rest);
  document.getElementById('out').innerHTML=html;
}

function renderBySubjectAndType(docs){
  // group: subject → type → []
  var map={};
  docs.forEach(function(d){
    var sub=d.subject||'General';var t=d.type||'other';
    if(!map[sub])map[sub]={};
    if(!map[sub][t])map[sub][t]=[];
    map[sub][t].push(d);
  });
  var html='';
  Object.keys(map).forEach(function(sub){
    Object.keys(map[sub]).forEach(function(type){
      var m=TM[type]||{icon:'📄',lbl:type,ibg:'#f5f5f5',itc:'#555',tbg:'#eee'};
      var items=map[sub][type];
      html+='<div class="sblock">'+
        '<div class="shd"><span>'+m.icon+'</span><span class="sttl">'+sub+' — '+m.lbl+'s</span><span class="sct">'+items.length+' items</span></div>'+
        '<div class="grid">'+items.map(renderCard).join('')+'</div></div>';
    });
  });
  return html;
}

function renderCard(doc){
  var m=TM[doc.type]||{icon:'📄',lbl:'Resource',ibg:'#f5f5f5',itc:'#555',tbg:'#eee'};
  var hasLink=!!(doc.fileUrl||doc.viewUrl);
  var dlUrl=doc.fileUrl||'#';
  var safe=JSON.stringify(doc).replace(/\\/g,'\\\\').replace(/'/g,"\\'").replace(/</g,'\\u003c');
  var dlBtn=hasLink
    ?'<a class="rcb dl" href="'+dlUrl+'" target="_blank" rel="noopener" download>⬇ Download</a>'
    :'<button class="rcb dl" onclick="toast(\'No PDF link added yet — add fileUrl in Firebase\')">⬇ Download</button>';
  return '<div class="rc">'+
    '<div class="rc-top"><div class="rc-ic" style="background:'+m.ibg+'">'+m.icon+'</div>'+
    '<div style="flex:1;min-width:0"><div class="rc-nm">'+(doc.title||doc.subject||'Untitled')+'</div>'+
    '<div class="rc-au">'+(doc.author||'SAKSHAR')+'</div></div></div>'+
    '<div style="display:flex;align-items:center;justify-content:space-between">'+
      '<span class="rtag" style="background:'+m.tbg+';color:'+m.itc+'">'+m.lbl+'</span>'+
      (hasLink?'<span style="color:var(--green);font-size:.67rem;font-weight:700">✅ Available</span>':'<span style="color:var(--g4);font-size:.67rem">Coming soon</span>')+
    '</div>'+
    '<div class="rc-acts">'+dlBtn+'<button class="rcb vw" onclick=\'openViewer('+safe+')\'>👁 View</button></div>'+
  '</div>';
}

function renderFormulasSection(formulas){
  var bySubject={};
  formulas.forEach(function(f){var sub=f.subject||'General';if(!bySubject[sub])bySubject[sub]=[];bySubject[sub].push(f);});
  var html='<div style="background:#FFF0F7;border-radius:11px;padding:14px 18px;margin-bottom:20px;border:1.5px solid #FCE7F3">'+
    '<div style="font-family:Baloo 2,cursive;font-size:1rem;font-weight:700;color:#DB2777;margin-bottom:4px">🧮 Formula Bank — '+formulas.length+' formulas from Firebase</div>'+
    '<div style="font-size:.82rem;color:#9D174D">All formulas are editable in Firestore → resources collection.</div></div><div class="fgrid">';
  Object.keys(bySubject).forEach(function(sub){
    var items=bySubject[sub];
    html+='<div class="fcard"><div class="fcard-hd">🧪 '+sub+' <span style="font-size:.68rem;background:#FFF0F7;color:#DB2777;padding:2px 8px;border-radius:10px;font-weight:700">'+items.length+'</span></div>';
    items.forEach(function(f){
      html+='<div class="feq"><span class="fn">'+(f.formulaName||f.title||'Formula')+':</span> '+(f.equation||'')+
        '<span class="fd">'+(f.description||f.author||'')+'</span></div>';
    });
    html+='</div>';
  });
  return html+'</div>';
}

// ═══ VIEWER ═══
function openViewer(doc){
  var m=TM[doc.type]||{icon:'📄',lbl:'Resource',ibg:'#f5f5f5'};
  document.getElementById('vttl').innerHTML=m.icon+' '+(doc.title||doc.subject||'Resource');
  var viewUrl=doc.viewUrl||doc.fileUrl||'';
  var dlUrl=doc.fileUrl||doc.viewUrl||'';
  var hasLink=!!(viewUrl);
  // Convert Google Drive share link → embed
  var embedUrl=viewUrl;
  if(viewUrl.includes('drive.google.com/file/d/')){
    var match=viewUrl.match(/\/d\/([^/?\s]+)/);
    if(match)embedUrl='https://drive.google.com/file/d/'+match[1]+'/preview';
  }
  var ts='';
  if(doc.uploadedAt&&doc.uploadedAt.seconds)ts=new Date(doc.uploadedAt.seconds*1000).toLocaleDateString('en-IN',{day:'numeric',month:'short',year:'numeric'});
  var ib='background:var(--cr);border-radius:9px;padding:12px';
  var il='font-size:.63rem;color:var(--g4);text-transform:uppercase;letter-spacing:1.2px;margin-bottom:3px';
  var iv='font-weight:700;font-size:.87rem;color:var(--nv)';
  var body='<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px">'+
    '<div style="'+ib+'"><div style="'+il+'">Subject</div><div style="'+iv+'">'+(doc.subject||'—')+'</div></div>'+
    '<div style="'+ib+'"><div style="'+il+'">Type</div><div style="'+iv+'">'+m.icon+' '+m.lbl+'</div></div>'+
    '<div style="'+ib+'"><div style="'+il+'">Author / Source</div><div style="'+iv+'">'+(doc.author||'SAKSHAR')+'</div></div>'+
    '<div style="'+ib+'"><div style="'+il+'">Semester</div><div style="'+iv+'">'+(doc.semester||'—')+'</div></div>'+
    '</div>';
  // Formula
  if(doc.type==='formula'&&doc.equation){
    body+='<div style="background:var(--g1);border-left:4px solid var(--sf);padding:16px;border-radius:0 10px 10px 0;margin-bottom:16px">'+
      '<div style="font-weight:700;color:var(--nv);margin-bottom:6px">'+(doc.formulaName||doc.title||'Formula')+'</div>'+
      '<div style="font-family:monospace;font-size:1.15rem;color:#7C3AED;font-weight:700">'+(doc.equation||'')+'</div>'+
      (doc.description?'<div style="font-size:.83rem;color:var(--g6);margin-top:6px">'+doc.description+'</div>':'')+
      '</div>';
  }
  // PDF embed
  if(hasLink&&embedUrl){
    body+='<div style="margin-bottom:16px">'+
      '<div style="font-size:.74rem;font-weight:700;color:var(--g4);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px">📄 PDF Preview</div>'+
      '<iframe class="pdf-frame" src="'+embedUrl+'" allowfullscreen></iframe>'+
      '<p style="font-size:.74rem;color:var(--g4);text-align:center;margin-top:4px">If preview doesn\'t load, use Open button below</p>'+
      '</div>';
  }
  // Action buttons
  if(hasLink){
    body+='<div style="background:#EDFAF2;border-radius:10px;padding:15px;border:1.5px dashed rgba(5,150,105,.3)">'+
      '<div style="font-weight:700;color:var(--green);margin-bottom:10px;font-size:.92rem">✅ PDF Available</div>'+
      '<div style="display:flex;gap:10px;flex-wrap:wrap">'+
      '<a href="'+dlUrl+'" download target="_blank" style="background:var(--sf);color:#fff;padding:9px 20px;border-radius:8px;font-weight:700;font-size:.85rem;text-decoration:none">⬇ Download PDF</a>'+
      '<a href="'+viewUrl+'" target="_blank" rel="noopener" style="background:var(--nv);color:#fff;padding:9px 20px;border-radius:8px;font-weight:700;font-size:.85rem;text-decoration:none">🔗 Open in New Tab</a>'+
      '</div></div>';
  } else {
    body+='<div style="background:#FFF3E8;border-radius:10px;padding:15px;border:1.5px dashed rgba(255,107,0,.3)">'+
      '<div style="font-weight:700;color:var(--sf);margin-bottom:6px;font-size:.92rem">📥 Add PDF Link</div>'+
      '<div style="font-size:.83rem;color:var(--g6)">In Firebase Console → <strong>resources</strong> collection → find this document → add <code style="background:var(--g1);padding:1px 5px;border-radius:4px">fileUrl</code> field with your PDF link.</div>'+
      '</div>';
  }
  document.getElementById('vbody').innerHTML=body;
  document.getElementById('vov').classList.add('open');
}
function closeV(){document.getElementById('vov').classList.remove('open');}

// ═══ SETUP GUIDE ═══

  return '<div class="setup-guide">'+
    '<h3>🔥 No resources yet — Add them to Firebase</h3>'+
    '<div class="sg-step"><div class="sg-num">1</div><div>Firebase Console → Firestore Database → <strong>+ Start collection</strong> → name it <code>resources</code></div></div>'+
    '<div class="sg-step"><div class="sg-num">2</div><div>Add a document (Auto-ID) with these fields:</div></div>'+
    '<table class="ft"><tr><th>Field</th><th>Type</th><th>Example value</th></tr>'+
    '<tr><td><code>dept</code></td><td>string</td><td>12sci</td></tr>'+
    '<tr><td><code>type</code></td><td>string</td><td>textbook | reference | notes | practice | pyq | formula</td></tr>'+
    '<tr><td><code>subject</code></td><td>string</td><td>Physics</td></tr>'+
    '<tr><td><code>semester</code></td><td>string</td><td>PCM — Physics, Chemistry, Mathematics</td></tr>'+
    '<tr><td><code>title</code></td><td>string</td><td>NCERT Physics Part 1</td></tr>'+
    '<tr><td><code>author</code></td><td>string</td><td>NCERT</td></tr>'+
    '<tr><td><code>fileUrl</code></td><td>string</td><td>https://... (PDF download URL)</td></tr>'+
    '<tr><td><code>viewUrl</code></td><td>string</td><td>https://drive.google.com/file/d/ID/view</td></tr>'+
    '<tr><td><code>approved</code></td><td>boolean</td><td>true</td></tr>'+
    '<tr><td><code>uploadedAt</code></td><td>timestamp</td><td>(today)</td></tr>'+
    '<tr><td colspan="3" style="color:#A78BFA;padding-top:8px"><strong>For type=formula add these instead of fileUrl:</strong></td></tr>'+
    '<tr><td><code>formulaName</code></td><td>string</td><td>Newton\'s 2nd Law</td></tr>'+
    '<tr><td><code>equation</code></td><td>string</td><td>F = m × a</td></tr>'+
    '<tr><td><code>description</code></td><td>string</td><td>Force = Mass × Acceleration</td></tr>'+
    '</table>'+
    '<div class="sg-step"><div class="sg-num">3</div><div>Firestore → Rules → paste: <code>allow read: if true;</code> → Publish</div></div>'+
    '<div class="sg-step"><div class="sg-num">4</div><div>Refresh this page — your resource appears instantly! ✅</div></div>'+
    '</div>';
}

// ═══ TOAST ═══
var _tt;
function toast(msg){var t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');clearTimeout(_tt);_tt=setTimeout(function(){t.classList.remove('show');},2800);}

// ═══ INIT ═══
buildSB();
loadAndRender();
</script>
